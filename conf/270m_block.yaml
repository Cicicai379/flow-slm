model:
  freeze: True
  ssl_model: "mimi"
  n_quantizers: 1
  decoder: "OpenELM-270M"
  flash_attention: True
  ssl_dim: 512
  decoder_dim: 1280
  reduction_factor: 1
  n_special_tokens: 12
  add_special_token_to_embedding_table: True
  token_emb_dim: 256
  n_res_blocks: 6
  token_conditioning: True
  future_conditioning: True
  norm: "static"
  mean_path: "statistics/mimi_mean.npy"
  std_path: "statistics/mimi_std.npy"
  extra_future_tokens: 4
  block_size: 8  # Block size for joint modeling

optimizer:
  name: AdamW
  lr: 0.0001
  loss_function: BLOCK_FM  # Block flow matching
  betas: [0.9, 0.98]
  eps: 1.0E-6
  weight_decay: 0.01
  null_prob: 0.05
  loss_weight: 1.0
  token_loss_weight: 1.0
  sigma_min: 1.0E-5
  t_dist: logit_normal

data:
    sr: 24000
    ext: flac
    vad: True

training:
  batch_size: 4  # Smaller for local testing
  num_workers: 2
  accumulate_grad_batches: 1
  num_warmup_steps: 100
  max_steps: 1000  # Short test run
  min_lr_ratio: 0.1